<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hotel Mistral — Alghero, Sardegna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app"></div>

<script src="image-slot.js"></script>
<script src="data.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [page, setPage] = useState("home");
  const [roomId, setRoomId] = useState(null);
  const [bookingOpen, setBookingOpen] = useState(false);
  const [bookingRoom, setBookingRoom] = useState(null);
  const [bookingPrefill, setBookingPrefill] = useState(null);

  const navigate = (p, id) => {
    setPage(p);
    if (id) setRoomId(id);
    window.scrollTo({ top: 0, behavior: "instant" });
  };

  const openBooking = (prefill) => {
    setBookingRoom(null);
    setBookingPrefill(prefill || null);
    setBookingOpen(true);
  };

  const openBookingForRoom = (room, prefill) => {
    setBookingRoom(room);
    setBookingPrefill(prefill || null);
    setBookingOpen(true);
  };

  return (
    <>
      <Nav page={page} navigate={navigate} onBook={()=>openBooking()} />

      {page === "home" && <HomePage navigate={navigate} onBook={openBooking} onBookRoom={openBookingForRoom} />}
      {page === "rooms" && <RoomsPage navigate={navigate} onBookRoom={openBookingForRoom} />}
      {page === "room" && <RoomDetailPage roomId={roomId} navigate={navigate} onBookRoom={openBookingForRoom} />}

      <Footer />
      <MobileCTA onBook={()=>openBooking()} />
      <BookingModal open={bookingOpen} onClose={()=>setBookingOpen(false)} room={bookingRoom} prefill={bookingPrefill} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
